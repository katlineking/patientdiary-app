<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReSpire FD Band Activity Log</title>
<meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ReSpire Logger">
    <link rel="apple-touch-icon" href="respire-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20 text-[17px]">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-2xl bg-blue-50 border border-blue-100 flex items-center justify-center overflow-hidden">
                    <img src="respirelogoclear.png" alt="ReSpire logo" class="w-9 h-9 object-contain" />
                </div>
                <h1 class="text-blue-700 font-bold text-2xl flex items-center gap-2">
                    ReSpire Log
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <button id="patientIdDisplay" onclick="setPatientId()" class="text-sm text-slate-700 font-semibold bg-slate-100 px-3 py-2 rounded-xl border border-slate-300 cursor-pointer hover:bg-slate-200 transition">Study ID: 102-A</button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <section class="bg-blue-50 border border-blue-100 rounded-2xl p-5">
            <h2 class="text-base font-bold text-blue-800">Quick Instructions</h2>
            <p class="mt-2 text-base leading-7 text-slate-800">Use this page to record activities such as sleeping, eating, exercise, medication, or lying flat while wearing the ReSpire FD Band.</p>
            <p class="mt-2 text-base leading-7 text-slate-800">Choose the activity, enter the start and end times, and tap <span class="font-semibold">Save Entry</span>.</p>
        </section>
        
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
            <h2 id="formTitle" class="text-lg font-bold text-slate-800 mb-4">Log Activity</h2>
            <div class="space-y-4">
                <input type="hidden" id="editId">
                <label for="activityType" class="block text-sm font-semibold text-slate-700">Activity</label>
                <select id="activityType" onchange="checkCustom(this)" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-4 text-base outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="" disabled selected>-- Select Activity --</option>
                    <option value="CUSTOM">+ Custom Activity</option>
                </select>
                <input type="text" id="customInput" placeholder="Enter custom activity name" class="hidden w-full bg-slate-50 border border-slate-300 rounded-xl p-4 text-base">
                <p id="saveStatus" class="hidden text-base font-medium text-emerald-800 bg-emerald-50 border border-emerald-100 rounded-xl px-4 py-3"></p>
                
                <div class="flex flex-col gap-3">
                    <div class="w-full">
                        <label class="block text-sm font-semibold text-slate-700 ml-1 mb-2">Start Time</label>
                        <input type="datetime-local" id="startTime" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-4 text-base">
                    </div>
                    <div class="w-full">
                        <label class="block text-sm font-semibold text-slate-700 ml-1 mb-2">End Time</label>
                        <input type="datetime-local" id="endTime" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-4 text-base">
                    </div>
                </div>

                <button id="saveBtn" onclick="saveLog()" class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl hover:opacity-90 transition shadow-md text-lg">
                    Save Entry
                </button>
                <button id="cancelBtn" onclick="resetForm()" class="hidden w-full text-slate-600 text-base font-medium py-2">Cancel Edit</button>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Daily View</h2>
                <input type="date" id="viewDate" onchange="renderAll()" class="text-base border-none bg-blue-50 text-blue-700 font-bold rounded-lg px-3 py-2">
            </div>
            
            <div class="h-40 mb-4 bg-slate-50 rounded-xl p-2 flex items-center justify-center">
                <canvas id="activityChart"></canvas>
            </div>

            <div id="logList" class="space-y-3">
            </div>
        </section>

        <button onclick="exportCSV()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2 shadow-lg text-lg">
            <i data-lucide="file-down"></i> Download Activity CSV
        </button>
    </main>

    <script>
    lucide.createIcons();
    
    // === PASTE YOUR GOOGLE APP SCRIPT URL HERE ===
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLiVb0hP1R6TQEW6N6ExZXJaBUYqvtcZ4680VEUFQmpTaqaHLASizj8X3d18LvAtxO6Q/exec';
    
    const DEFAULT_ACTIVITIES = ['Sleeping', 'Eating', 'Exercise', 'Medication', 'Lying Flat'];
    let logs = JSON.parse(localStorage.getItem('coughLogs')) || [];
    let customActivities = JSON.parse(localStorage.getItem('customActivities')) || [];
    let chart;
    
    // --- NEW ONBOARDING LOGIC ---
    // Try to get the ID from local storage
    let patientId = localStorage.getItem('patientId');

    // If no ID exists (first time loading the app), force them to enter one
    if (!patientId) {
        // The while loop ensures they cannot just hit "Cancel" or leave it blank
        while (!patientId || patientId.trim() === "") {
            patientId = prompt("Welcome to the ReSpire activity log.\n\nPlease enter your Study ID to continue:");
        }
        // Clean up any accidental spaces and save it
        patientId = patientId.trim();
        localStorage.setItem('patientId', patientId);
    }

    // Display the ID on the screen
    document.getElementById('patientIdDisplay').innerText = 'Study ID: ' + patientId;

    // They can still click the ID on the screen to change it later if they make a mistake
    function setPatientId() {
        const newId = prompt("Update Study ID:", patientId);
        if (newId && newId.trim() !== "") {
            patientId = newId.trim();
            localStorage.setItem('patientId', patientId);
            document.getElementById('patientIdDisplay').innerText = 'Study ID: ' + patientId;
        }
    }
    
    document.getElementById('viewDate').value = new Date().toISOString().split('T')[0];

    function normalizeActivityName(name) {
        const trimmed = name.trim().replace(/\s+/g, ' ');
        return trimmed
            .toLowerCase()
            .split(' ')
            .filter(Boolean)
            .map(word => word.charAt(0).toUpperCase() + word.slice(1))
            .join(' ');
    }

    function getAllActivities() {
        return [...DEFAULT_ACTIVITIES, ...customActivities];
    }

    function renderActivityOptions(selectedValue = '') {
        const select = document.getElementById('activityType');
        const activityOptions = getAllActivities();
        select.innerHTML = `
            <option value="" disabled ${selectedValue === '' ? 'selected' : ''}>-- Select Activity --</option>
            ${activityOptions.map(activity => `<option value="${activity}" ${selectedValue === activity ? 'selected' : ''}>${activity}</option>`).join('')}
            <option value="CUSTOM" ${selectedValue === 'CUSTOM' ? 'selected' : ''}>+ Custom Activity</option>
        `;
    }

    function rememberCustomActivity(name) {
        const normalized = normalizeActivityName(name);
        if (!normalized) return '';
        if (!DEFAULT_ACTIVITIES.includes(normalized) && !customActivities.includes(normalized)) {
            customActivities.push(normalized);
            customActivities.sort((a, b) => a.localeCompare(b));
            localStorage.setItem('customActivities', JSON.stringify(customActivities));
        }
        return normalized;
    }

    function checkCustom(s) { 
        const isCustom = s.value === 'CUSTOM';
        document.getElementById('customInput').classList.toggle('hidden', !isCustom);
        if (isCustom) {
            document.getElementById('customInput').focus();
        }
    }

    function getActivityColor(type) {
        const colorMap = {
            'Sleeping': '#3b82f6',
            'Eating': '#10b981',
            'Exercise': '#ef4444',
            'Medication': '#f59e0b',
            'Lying Flat': '#8b5cf6'
        };
        return colorMap[type] || '#94a3b8';
    }

    // UPDATED SAVELOG WITH GOOGLE SHEETS INTEGRATION
    function saveLog() {
        const id = document.getElementById('editId').value;
        let type = document.getElementById('activityType').value;
        if (type === 'CUSTOM') type = rememberCustomActivity(document.getElementById('customInput').value);
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;

        if (!start || !end || !type) return alert("Please select an activity and set both times.");
        if (new Date(end) < new Date(start)) return alert("End time must be after the start time.");

        const entry = { id: id ? parseInt(id) : Date.now(), type, start, end };

        if (id) {
            const index = logs.findIndex(l => l.id === parseInt(id));
            logs[index] = entry;
        } else {
            logs.push(entry);
            
            // --- NEW: SEND TO GOOGLE SHEETS IN THE BACKGROUND ---
            if (GOOGLE_SCRIPT_URL !== 'YOUR_WEB_APP_URL_HERE') {
                const sheetData = {
                    patientId: patientId,
                    type: type,
                    start: start,
                    end: end
                };
                
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Bypasses CORS issues for simple logging
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(sheetData)
                }).then(() => console.log("Sent to Google Sheets"))
                  .catch(err => console.error("Error sending to sheets:", err));
            }
        }

        localStorage.setItem('coughLogs', JSON.stringify(logs));
        const saveStatus = document.getElementById('saveStatus');
        saveStatus.textContent = id ? 'Activity entry updated.' : 'Activity entry saved.';
        saveStatus.classList.remove('hidden');
        renderActivityOptions();
        resetForm();
        renderAll();
    }

    function editLog(id) {
        const entry = logs.find(l => l.id === id);
        document.getElementById('editId').value = entry.id;
        const isKnownActivity = getAllActivities().includes(entry.type);
        renderActivityOptions(isKnownActivity ? entry.type : "CUSTOM");
        if (!isKnownActivity) {
            document.getElementById('customInput').value = entry.type;
            document.getElementById('customInput').classList.remove('hidden');
        } else {
            document.getElementById('customInput').classList.add('hidden');
            document.getElementById('customInput').value = "";
        }
        document.getElementById('startTime').value = entry.start;
        document.getElementById('endTime').value = entry.end;
        document.getElementById('formTitle').innerText = "Edit Activity";
        document.getElementById('saveBtn').innerText = "Update Entry";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteLog(id) {
        if(confirm("Delete this log?")) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('coughLogs', JSON.stringify(logs));
            renderAll();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('formTitle').innerText = "Log Activity";
        document.getElementById('saveBtn').innerText = "Save Entry";
        document.getElementById('cancelBtn').classList.add('hidden');
        document.getElementById('startTime').value = "";
        document.getElementById('endTime').value = "";
        renderActivityOptions();     
        document.getElementById('customInput').value = "";
        document.getElementById('customInput').classList.add('hidden');
    }

    function renderAll() {
        const selectedDate = document.getElementById('viewDate').value;
        logs.sort((a, b) => new Date(a.start) - new Date(b.start)); 
        
        const filtered = logs.filter(l => {
            const startDay = l.start.split('T')[0];
            const endDay = l.end.split('T')[0];
            return selectedDate >= startDay && selectedDate <= endDay;
        });

        const list = document.getElementById('logList');
        
        if (filtered.length === 0) {
            list.innerHTML = `<p class="text-center text-slate-400 text-sm italic py-4">No data for this date.</p>`;
        } else {
            list.innerHTML = filtered.map(l => `
                <div class="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-xl shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-8 rounded-full" style="background-color: ${getActivityColor(l.type)}"></div>
                        <div>
                            <p class="font-bold text-slate-800 text-lg">${l.type}</p>
                            <p class="text-sm text-slate-600">${new Date(l.start).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} - ${new Date(l.end).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editLog(${l.id})" class="p-3 text-slate-500 hover:text-blue-600" aria-label="Edit activity entry"><i data-lucide="edit-3" size="20"></i></button>
                        <button onclick="deleteLog(${l.id})" class="p-3 text-slate-500 hover:text-red-600" aria-label="Delete activity entry"><i data-lucide="trash-2" size="20"></i></button>
                    </div>
                </div>
            `).join('');
        }
        lucide.createIcons();
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('activityChart').getContext('2d');
        const selectedDate = document.getElementById('viewDate').value;
        
        const filtered = logs.filter(l => {
            const startDay = l.start.split('T')[0];
            const endDay = l.end.split('T')[0];
            return selectedDate >= startDay && selectedDate <= endDay;
        });

        if (chart) chart.destroy();

        const chartData = filtered.map(l => {
            const start = new Date(l.start);
            const end = new Date(l.end);
            const startDay = l.start.split('T')[0];
            const endDay = l.end.split('T')[0];

            let startHour = 0;
            let endHour = 24;

            if (startDay === selectedDate) {
                startHour = start.getHours() + (start.getMinutes() / 60);
            }
            if (endDay === selectedDate) {
                endHour = end.getHours() + (end.getMinutes() / 60);
            }

            return {
                x: [startHour, endHour],
                y: 'Activities',
                label: l.type,
                color: getActivityColor(l.type)
            };
        });

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Activities'],
                datasets: [{
                    data: chartData,
                    backgroundColor: chartData.map(d => d.color + '99'),
                    borderRadius: 6,
                    borderSkipped: false,
                    barPercentage: 0.8
                }]            
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        min: 0, max: 24,
                        ticks: {
                            stepSize: 3,
                            callback: function(value) {
                                if (value === 0 || value === 24) return '12 AM';
                                if (value === 12) return '12 PM';
                                return value > 12 ? (value - 12) + ' PM' : value + ' AM';
                            }
                        }
                    },
                    y: { display: false }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: { label: (ctx) => `${ctx.raw.label}` }
                    }
                }
            }
        });
    }

    function exportCSV() {
        let csv = "Type,StartTime,EndTime\n" + logs.map(l => `${l.type},${l.start},${l.end}`).join("\n");
        const link = document.createElement("a");
        link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        link.download = `ActivityLog_${patientId}_Data.csv`; // Updated to match new theme
        link.click();
    }

    renderActivityOptions();
    renderAll();
    </script>
</body>
</html>
